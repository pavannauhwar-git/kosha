name: Bug report
description: Report a functional issue or regression in Kosha.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide enough detail so we can reproduce quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps from app open to failure.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Transactions
        - Bills
        - Analytics
        - Auth / Onboarding
        - Realtime
        - Supabase / Data layer
        - CI / Tooling
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser/OS and app environment.
      placeholder: e.g. Chrome 123 on Android 14, prod

  - type: textarea
    id: evidence
    attributes:
      label: Logs / screenshots
      description: Paste errors and attach screenshots or recordings where possible.

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who is affected and how severe is it?
