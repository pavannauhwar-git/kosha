<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta
      name="description"
      content="Kosha is a personal finance PWA for tracking transactions, bills, loans, and insights with realtime sync."
    />

    <!-- PWA theme -->
    <meta name="theme-color" content="#007FFF" />
    <meta name="application-name" content="Kosha" />

    <!-- iOS PWA — all three meta tags required -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kosha" />

    <!-- apple-touch-icon: provide all sizes + unsized fallback.
         iOS reads the best-matching size; older devices use the unsized fallback.
         No leading slash — more reliable on Vercel's CDN edge nodes. -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
    <link rel="apple-touch-icon"                 href="icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Font -->
    <!-- Managed via @fontsource in src/main.jsx -->

    <title>Kosha — Your Financial Sheath</title>
    <!-- Instant Theme Application to prevent FOUC -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('kosha-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (!stored && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
    
    <style>
      /* ── Instant-paint branded splash shell ────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #F6F8FA;
        font-family: 'InterVariable', 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      html.dark body { background-color: #111318; }

      /* Full-screen loader */
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        gap: 0;
        position: relative;
      }

      /* Center brand mark */
      .initial-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        opacity: 0;
        transform: translateY(8px);
        animation: splash-rise 0.42s cubic-bezier(0.05, 0.7, 0.1, 1) 0.05s both;
      }

      /* App icon mark */
      .initial-logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0,127,255,0.28), 0 2px 8px rgba(0,0,0,0.12);
      }
      .initial-logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      html.dark .initial-logo {
        box-shadow: 0 8px 28px rgba(0,127,255,0.38), 0 2px 10px rgba(0,0,0,0.30);
      }

      .initial-wordmark {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #111318;
        line-height: 1;
      }
      html.dark .initial-wordmark { color: #E2E6EA; }

      .initial-tagline {
        font-size: 12px;
        font-weight: 400;
        color: #74777F;
        letter-spacing: 0.01em;
        margin-top: -6px;
      }

      /* Bottom shimmer progress bar */
      .initial-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        overflow: hidden;
        opacity: 0;
        animation: splash-rise 0.4s ease 0.3s both;
      }
      .initial-progress-track {
        position: absolute;
        inset: 0;
        background: rgba(0,127,255,0.12);
      }
      .initial-progress-bar {
        position: absolute;
        top: 0; bottom: 0; left: -60%;
        width: 40%;
        background: linear-gradient(90deg, transparent 0%, #007FFF 40%, #4DA6FF 60%, transparent 100%);
        animation: progress-sweep 1.4s cubic-bezier(0.4, 0, 0.6, 1) 0.35s infinite;
        border-radius: 0 2px 2px 0;
      }
      html.dark .initial-progress-bar {
        background: linear-gradient(90deg, transparent 0%, #4DA6FF 40%, #80C4FF 60%, transparent 100%);
      }

      /* Nav ghost at bottom */
      .initial-nav {
        position: absolute;
        bottom: 0;
        left: 0; right: 0;
        height: calc(env(safe-area-inset-bottom, 0px) + 70px);
        background: rgba(255,255,255,0.94);
        border-top: 1px solid rgba(0,0,0,0.06);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      html.dark .initial-nav {
        background: rgba(29,32,36,0.94);
        border-top: 1px solid rgba(255,255,255,0.07);
      }

      @keyframes splash-rise {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes progress-sweep {
        0%   { left: -60%; }
        100% { left: 120%; }
      }

      /* When React mounts it removes .initial-loader */
      #root:not(:has(.initial-loader)) .initial-loader {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <!-- Bottom nav ghost -->
        <div class="initial-nav"></div>

        <!-- Centered brand -->
        <div class="initial-brand">
          <div class="initial-logo">
            <img src="icons/icon-192.png" alt="Kosha" />
          </div>
          <div class="initial-wordmark">Kosha</div>
          <div class="initial-tagline">Your financial sheath</div>
        </div>

        <!-- Progress bar -->
        <div class="initial-progress">
          <div class="initial-progress-track"></div>
          <div class="initial-progress-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
