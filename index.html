<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta
      name="description"
      content="Kosha is a personal finance PWA for tracking transactions, bills, loans, and insights with realtime sync."
    />

    <!-- PWA theme -->
    <meta name="theme-color" content="#007FFF" />
    <meta name="application-name" content="Kosha" />

    <!-- iOS PWA — all three meta tags required -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kosha" />

    <!-- apple-touch-icon: provide all sizes + unsized fallback.
         iOS reads the best-matching size; older devices use the unsized fallback.
         No leading slash — more reliable on Vercel's CDN edge nodes. -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
    <link rel="apple-touch-icon"                 href="icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Font -->
    <!-- Managed via @fontsource in src/main.jsx -->

    <title>Kosha — Your Financial Sheath</title>
    <!-- Instant Theme Application to prevent FOUC -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('kosha-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (!stored && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
    
    <style>
      /* Pure CSS Skeleton for Instant First Paint */
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #F6F8FA; /* Default Light */
      }
      html.dark body { background-color: #111318; }
      
      .initial-loader {
        display: flex; flex-direction: column;
        height: 100vh; height: 100dvh;
        justify-content: space-between;
      }
      .initial-nav {
        height: calc(env(safe-area-inset-bottom, 0px) + 64px);
        background: #FFFFFF;
        border-top: 1px solid rgba(0,0,0,0.05);
      }
      html.dark .initial-nav {
        background: #1C1F26;
        border-top: 1px solid rgba(255,255,255,0.05);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div style="flex:1"></div>
        <div class="initial-nav"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
